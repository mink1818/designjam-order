<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>디자인 삭스 회원가입</title>

  <link rel="stylesheet" href="style.css">

  <meta name="theme-color" content="#24589f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="디자인 삭스">
  <link rel="manifest" href="manifest-customer.webmanifest">
  <link rel="icon" href="icons/customer-192.png?v=3521">
  <link rel="apple-touch-icon" href="icons/customer-180.png?v=3521">
</head>

<body data-pwa-app="customer">

<header>
  <h1>🧦 디자인 삭스</h1>
  <p>거래처 회원가입</p>
</header>

<main class="container">

  <section class="product-card auth-card">

    <h2>회원가입</h2>

    <label for="businessName">
      거래처명 *
    </label>

    <input
      id="businessName"
      class="order-input"
      type="text"
      autocomplete="organization"
      placeholder="예: 행복상회"
    >

    <label for="ownerName">
      대표자명
    </label>

    <input
      id="ownerName"
      class="order-input"
      type="text"
      autocomplete="name"
      placeholder="예: 홍길동"
    >

    <label for="signupPhone">
      휴대폰번호 *
    </label>

    <input
      id="signupPhone"
      class="order-input"
      type="tel"
      inputmode="numeric"
      autocomplete="tel"
      maxlength="13"
      placeholder="예: 010-1234-5678"
    >

    <label for="address">
      주소
    </label>

    <input
      id="address"
      class="order-input"
      type="text"
      autocomplete="street-address"
      placeholder="사업장 주소"
    >

    <label for="signupPassword">
      비밀번호 *
    </label>

    <input
      id="signupPassword"
      class="order-input"
      type="password"
      autocomplete="new-password"
      minlength="6"
      placeholder="6자리 이상"
    >

    <label for="passwordConfirm">
      비밀번호 확인 *
    </label>

    <input
      id="passwordConfirm"
      class="order-input"
      type="password"
      autocomplete="new-password"
      minlength="6"
      placeholder="비밀번호 다시 입력"
    >

    <button
      id="signupButton"
      class="cart-btn"
      type="button"
    >
      회원가입 신청
    </button>

    <button
      class="cart-btn gray-btn"
      type="button"
      onclick="location.href='login.html'"
    >
      로그인으로 이동
    </button>

    <div id="signupMessage"></div>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/signup.js"></script>

<script src="js/pwa.js"></script>
</body>
</html>
