  <meta name="theme-color" content="#24589f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" href="icons/customer-192.png?v=4022">
  <link rel="apple-touch-icon" href="icons/customer-180.png?v=4022">

<body class="auth-pending" data-session-page="customer" data-pwa-app="customer">

<header>
  <h1>🧦 디자인 삭스</h1>
  <p>내 주문 조회</p>
</header>

<main class="container">

  <button
    class="cart-btn gray-btn"
    type="button"
    onclick="location.href='index.html'"
  >
    ← 주문페이지로 돌아가기
  </button>

  <section class="order-tools-card" id="download-orders"><div><h2>주문내역 관리</h2><p>최근 주문을 다시 담거나 주문내역을 파일로 저장할 수 있습니다.</p></div><button class="cart-btn compact-order-tool" id="downloadOrdersBtn" type="button">주문내역 CSV 다운로드</button></section>
  <section id="activeOrderResult"></section>

  <section class="completed-orders-section">
    <div class="completed-orders-heading">
      <div>
        <h2>출고완료 내역</h2>
        <p>완료 주문은 간단히 보관되며 눌러서 상세 내용을 확인할 수 있습니다.</p>
      </div>
      <select id="completedPeriod" aria-label="출고완료 조회기간">
        <option value="90">최근 3개월</option>
        <option value="180">최근 6개월</option>
        <option value="365">최근 1년</option>
        <option value="all">전체 기간</option>
      </select>
    </div>
    <section id="completedOrderResult"></section>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/ui-preferences.js?v=4022"></script>
<script src="js/order.js?v=4022"></script>

  <a href="order.html" class="active"><span>📦</span>주문</a>
  <a href="customer-settings.html"><span>👤</span>내정보</a>
</nav>
</body>
</html>
