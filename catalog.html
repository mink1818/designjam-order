<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  
  <meta name="description" content="디자인삭스 거래처용 상품 주문 및 주문조회 시스템">
  <meta property="og:title" content="디자인삭스 주문관리 (거래처)">
  <meta property="og:description" content="디자인삭스 거래처용 상품 주문 및 주문조회 시스템">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://designjam-order.vercel.app/catalog.html">
  <meta property="og:image" content="https://designjam-order.vercel.app/icons/customer-512.png?v=402">
<title>디자인삭스 주문관리 (거래처)</title>

  <link rel="stylesheet" href="css/main.css?v=402">

  <meta name="theme-color" content="#24589f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="디자인삭스 거래처">
  <link rel="manifest" href="manifest-customer.webmanifest?v=402">
  <link rel="icon" href="icons/customer-192.png?v=402">
  <link rel="apple-touch-icon" href="icons/customer-180.png?v=402">
</head>

<body class="auth-pending" data-session-page="customer" data-pwa-app="customer">

<header>
  <h1>🧦 디자인 삭스</h1>
  <p>상품 주문</p>
</header>

<main class="container">

  <section id="adminPreviewBanner" class="admin-preview-banner" hidden>
    <div>
      <strong>관리자 미리보기 모드</strong>
      <span>거래처 화면을 확인하는 중입니다. 장바구니와 주문조회 화면은 확인할 수 있으며 주문 접수만 차단됩니다.</span>
    </div>
    <button class="cart-btn compact-action" type="button" onclick="location.href='admin-home.html'">관리자 메뉴로 돌아가기</button>
  </section>

  <div class="customer-top-menu">
    <button class="cart-btn" type="button" data-customer-orders-button onclick="location.href='order.html'">내 주문조회</button>
  </div>

  <button
    class="cart-btn gray-btn"
    type="button"
    onclick="location.href='index.html'"
  >
    ← 기존 주문페이지로 돌아가기
  </button>

  <section id="customerNoticeArea" class="customer-notice-area" hidden></section>

  <input
    id="catalogSearch"
    class="search"
    type="text"
    placeholder="카테고리명 / 품번 / 가격 검색"
  >

  <div id="catalogFilters" class="filter-buttons"></div>

  <section id="catalogList">
    <p>상품을 불러오는 중...</p>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/catalog.js?v=402"></script>

<script src="js/customer-notices.js?v=402"></script>
<script src="js/session-status.js?v=402"></script>
<script src="js/pwa.js?v=402"></script>
<script src="js/version-badge.js?v=402"></script>
<script src="js/back-navigation.js?v=402"></script>
<script src="js/ui-preferences.js?v=402"></script>
</body>
</html>
