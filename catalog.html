<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>디자인 삭스 주문관리</title>

  <link rel="stylesheet" href="css/main.css">

  <meta name="theme-color" content="#24589f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="디자인 삭스">
  <link rel="manifest" href="manifest-customer.webmanifest">
  <link rel="icon" href="icons/customer-192.png">
  <link rel="apple-touch-icon" href="icons/customer-180.png">
</head>

<body class="auth-pending" data-session-page="customer" data-pwa-app="customer">

<header>
  <h1>🧦 디자인 삭스</h1>
  <p>상품 주문</p>
</header>

<main class="container">

  <button id="adminQuickMenu" class="cart-btn admin-customer-quick" type="button" onclick="location.href='admin-home.html'" hidden>관리자 메뉴로 이동</button>

  <button
    class="cart-btn gray-btn"
    type="button"
    onclick="location.href='index.html'"
  >
    ← 상품 주문으로 돌아가기
  </button>

  <section id="customerNoticeArea" class="customer-notice-area" hidden></section>

  <input
    id="catalogSearch"
    class="search"
    type="text"
    placeholder="카테고리명 / 품번 / 가격 검색"
  >

  <div id="catalogFilters" class="filter-buttons"></div>

  <section id="catalogList">
    <p>상품을 불러오는 중...</p>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/catalog.js"></script>

<script src="js/customer-notices.js"></script>
<script src="js/session-status.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
