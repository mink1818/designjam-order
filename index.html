<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  
  <meta name="description" content="디자인삭스 거래처용 상품 주문 및 주문조회 시스템">
  <meta property="og:title" content="디자인삭스 주문관리 (거래처)">
  <meta property="og:description" content="디자인삭스 거래처용 상품 주문 및 주문조회 시스템">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://designjam-order.vercel.app/">
  <meta property="og:image" content="https://designjam-order.vercel.app/icons/customer-512.png?v=5335">
<title>디자인삭스 주문관리 (거래처)</title>

  <link rel="stylesheet" href="css/main.css?v=5335">

  <meta name="theme-color" content="#24589f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="디자인삭스 거래처">
  <link rel="manifest" href="manifest-customer.webmanifest?v=5335">
  <link rel="icon" href="icons/customer-192.png?v=5335">
  <link rel="apple-touch-icon" href="icons/customer-180.png?v=5335">
</head>

<body class="auth-pending" data-session-page="customer" data-pwa-app="customer">

<header>
  <h1>🧦 디자인 삭스</h1>
  <p>거래처 상품 주문</p>
</header>

<main class="container">

  <section id="adminPreviewBanner" class="admin-preview-banner" hidden>
    <div>
      <strong>관리자 미리보기 모드</strong>
      <span>거래처 화면을 확인하는 중입니다. 장바구니와 주문조회 화면은 확인할 수 있으며 주문 접수만 차단됩니다.</span>
    </div>
  </section>

  <input
    id="catalogSearch"
    class="search"
    type="text"
    placeholder="품번 검색"
  >

  <div id="catalogFilters" class="filter-buttons"></div>

  <section id="catalogList">
    <p>상품을 불러오는 중...</p>
  </section>

</main>

<div id="customerSearchModal" class="customer-search-modal" hidden aria-hidden="true">
  <div class="customer-search-backdrop" data-close-search></div>
  <section class="customer-search-dialog" role="dialog" aria-modal="true" aria-labelledby="customerSearchTitle">
    <div class="customer-search-head">
      <h2 id="customerSearchTitle">상품 검색</h2>
      <button type="button" class="customer-search-close" data-close-search aria-label="검색 닫기">×</button>
    </div>
    <div class="customer-search-input-wrap">
      <span aria-hidden="true">🔎</span>
      <input id="customerLiveSearch" type="search" autocomplete="off" placeholder="나이키, 6005처럼 입력하세요">
    </div>
    <p class="customer-search-help">브랜드·카테고리·상품명·품번을 한 번에 검색합니다.</p>
    <div id="customerSearchResults" class="customer-search-results"></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/catalog.js?v=5335"></script>

<script src="js/session-status.js?v=5335"></script>
<script src="js/pwa.js?v=5335"></script>
<script src="js/version-badge.js?v=5335"></script>
<script src="js/back-navigation.js?v=5335"></script>
<script src="js/ui-preferences.js?v=5335"></script>

<nav class="customer-bottom-nav" aria-label="거래처 빠른 메뉴">
  <a href="index.html" class="active"><span>🏠</span>홈</a>
  <a href="catalog.html?search=1" data-customer-search-trigger><span>🔎</span>검색</a>
  <a href="catalog.html#cart"><span>🛒</span>장바구니</a>
  <a href="order.html"><span>📦</span>주문</a>
  <a href="customer-settings.html"><span>👤</span>내정보</a>
</nav>
</body>
</html>
