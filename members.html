<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>거래처관리 V3.1</title><link rel="stylesheet" href="css/admin.css"></head>
<body class="auth-pending" data-session-page="admin"><header><h1>🏢 거래처관리</h1><p>승인·등급·할인·외상·관리자 메모</p></header>
<main class="container">
<button class="cart-btn gray-btn" onclick="location.href='admin-home.html'">← 관리자 대시보드</button>
<div class="dashboard"><div><strong id="waitingCount">0</strong><span>승인대기</span></div><div><strong id="approvedCount">0</strong><span>승인완료</span></div><div><strong id="blockedCount">0</strong><span>차단</span></div><div><strong id="creditCount">0</strong><span>외상허용</span></div></div>
<div class="v3-toolbar"><input id="memberSearch" class="search" type="text" placeholder="상호·대표자·전화번호·이메일 검색"><select id="memberSort"><option value="new">최근 가입순</option><option value="order">최근 주문순</option><option value="sales">누적금액순</option><option value="name">거래처명순</option></select></div>
<div class="admin-filter"><button onclick="setMemberFilter('전체')">전체</button><button onclick="setMemberFilter('승인대기')">승인대기</button><button onclick="setMemberFilter('승인완료')">승인완료</button><button onclick="setMemberFilter('차단')">차단</button></div>
<button class="cart-btn" onclick="loadCustomers()">거래처 새로고침</button><section class="product-card admin-account-create"><h2>관리자 계정 추가</h2><p>새 관리자 이메일과 임시 비밀번호를 입력합니다.</p><div class="v3-notice-form"><label>이메일<input id="newAdminEmail" type="email" placeholder="admin@example.com"></label><label>관리자명<input id="newAdminName" placeholder="관리자명"></label><label>임시 비밀번호<input id="newAdminPassword" type="password" minlength="8" placeholder="8자 이상"></label></div><button class="cart-btn" id="createAdminBtn" type="button">관리자 추가</button><small>Supabase Edge Function 배포 후 작동합니다.</small></section><div id="customerList"></div>
</main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/members.js"></script><script src="js/session-status.js"></script></body></html>
