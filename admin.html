<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="description" content="디자인삭스 관리자용 주문·출고 관리 시스템">
  <meta property="og:title" content="디자인삭스 주문관리 (관리자)">
  <meta property="og:description" content="디자인삭스 관리자용 주문·출고 관리 시스템">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://designjam-order.vercel.app/admin.html">
  <meta property="og:image" content="https://designjam-order.vercel.app/icons/admin-512.png?v=4022">
<title>디자인삭스 주문관리 (관리자)</title>
  <link rel="stylesheet" href="css/admin.css?v=5100">

  <meta name="theme-color" content="#112437">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="디자인삭스 관리자">
  <link rel="manifest" href="manifest-admin.webmanifest?v=4022">
  <link rel="icon" href="icons/admin-192.png?v=4022">
  <link rel="apple-touch-icon" href="icons/admin-180.png?v=4022">
</head>
<body class="auth-pending" data-session-page="admin" data-pwa-app="admin">

<header>
  <h1>🧦 디자인 삭스 관리자</h1>
  <p>주문관리</p>
</header>

<main class="container">
  <div id="loginBox" class="product-card auth-card">
  <h2>관리자 로그인</h2>

  <label>관리자 이메일</label>
  <input
    id="adminEmail"
    class="order-input"
    type="email"
    placeholder="관리자 이메일"
  >

  <label>비밀번호</label>
  <input
    id="adminPassword"
    class="order-input"
    type="password"
    placeholder="비밀번호"
  >

  <button class="cart-btn" onclick="adminLogin()">
    관리자 로그인
  </button>

  <button class="cart-btn install-app-button" type="button" data-install-app>관리자 앱 홈 화면에 추가</button>

  <div id="adminLoginMessage"></div>
</div>

<div id="adminContent" style="display:none;">
  <div class="admin-page-actions">
    <button class="cart-btn gray-btn" type="button" onclick="location.href='admin-home.html'">
      ← 관리자 전체 메뉴
    </button>
  </div>
  <div class="dashboard">
    <div><strong id="totalCount">0</strong><span>전체</span></div>
    <div><strong id="pendingCount">0</strong><span>주문접수</span></div>
    <div><strong id="doneCount">0</strong><span>출고완료</span></div>
  </div>
  <input id="adminSearch" class="search" placeholder="거래처명 / 품번 / 주문번호 검색">

  <div class="admin-filter">
    <button onclick="setAdminFilter('전체')">전체</button>
    <button onclick="setAdminFilter('주문접수')">주문접수</button>
    <button onclick="setAdminFilter('출고완료')">출고완료</button>
  </div>

  <div class="completed-toolbar">
    <label for="adminCompletedPeriod">출고완료 보관기간</label>
    <select id="adminCompletedPeriod" onchange="loadOrders()">
      <option value="30">최근 30일</option>
      <option value="90">최근 3개월</option>
      <option value="180">최근 6개월</option>
      <option value="365">최근 1년</option>
      <option value="all">전체 기간</option>
    </select>
    <span>오래된 완료 주문은 기간을 선택해 조회합니다.</span>
  </div>

  <button class="cart-btn" onclick="loadOrders()">주문 새로고침</button>

  <section id="adminOrders"></section>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin-config.js?v=4022"></script>
<script src="js/admin-data.js?v=4022"></script>
<script src="js/admin-ui.js?v=4022"></script>
<script src="js/admin.js?v=4022"></script>
<script src="js/session-status.js?v=4022"></script>

<script src="js/pwa.js?v=4022"></script>
<script src="js/admin-page-transition.js?v=4022"></script>
<script src="js/version-badge.js?v=5100"></script>
<script src="js/back-navigation.js?v=4022"></script>
<script src="js/ui-preferences.js?v=4022"></script>
</body>
</html>
