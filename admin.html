<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="description" content="디자인삭스 관리자용 주문·출고 관리 시스템">
  <meta property="og:title" content="디자인삭스 주문관리 (관리자)">
  <meta property="og:description" content="디자인삭스 관리자용 주문·출고 관리 시스템">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://designjam-order.vercel.app/admin.html">
  <meta property="og:image" content="https://designjam-order.vercel.app/icons/admin-512.png?v=5332">
<title>디자인삭스 주문관리 (관리자)</title>
  <link rel="stylesheet" href="css/admin.css?v=5332">

  <meta name="theme-color" content="#112437">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="디자인삭스 관리자">
  <link rel="manifest" href="manifest-admin.webmanifest?v=5332">
  <link rel="icon" href="icons/admin-192.png?v=5332">
  <link rel="apple-touch-icon" href="icons/admin-180.png?v=5332">
</head>
<body class="auth-pending" data-session-page="admin" data-pwa-app="admin">

<header>
  <h1>🧦 디자인 삭스 관리자</h1>
  <p>주문관리</p>
</header>

<main class="container">
  <div id="loginBox" class="product-card auth-card">
  <h2>관리자 로그인</h2>

  <label>관리자 이메일</label>
  <input
    id="adminEmail"
    class="order-input"
    type="email"
    placeholder="관리자 이메일"
  >

  <label>비밀번호</label>
  <input
    id="adminPassword"
    class="order-input"
    type="password"
    placeholder="비밀번호"
  >

  <button class="cart-btn" onclick="adminLogin()">
    관리자 로그인
  </button>

  <button class="cart-btn install-app-button" type="button" data-install-app>관리자 앱 홈 화면에 추가</button>

  <div id="adminLoginMessage"></div>
</div>

<div id="adminContent" style="display:none;">
  <section class="order-admin-toolbar product-card">
    <div class="order-status-tabs" role="tablist" aria-label="주문 상태">
      <button id="tabPending" class="order-status-tab active pending" type="button" onclick="setAdminFilter('주문접수')">주문접수 <b id="pendingCount">0</b></button>
      <button id="tabDone" class="order-status-tab done" type="button" onclick="setAdminFilter('출고완료')">출고완료 <b id="doneCount">0</b></button>
      <button id="tabAll" class="order-status-tab" type="button" onclick="setAdminFilter('전체')">전체 <b id="totalCount">0</b></button>
    </div>
    <div class="order-toolbar-row">
      <input id="adminSearch" class="search order-admin-search" placeholder="거래처명 / 품번 / 주문번호 검색">
      <button class="cart-btn order-refresh-btn" type="button" onclick="loadOrders()">새로고침</button>
    </div>
  </section>

  <div class="completed-toolbar">
    <label for="adminCompletedPeriod">출고완료 보관기간</label>
    <select id="adminCompletedPeriod" onchange="loadOrders()">
      <option value="30">최근 30일</option>
      <option value="90">최근 3개월</option>
      <option value="180">최근 6개월</option>
      <option value="365">최근 1년</option>
      <option value="all">전체 기간</option>
    </select>
    <span>오래된 완료 주문은 기간을 선택해 조회합니다.</span>
  </div>

  <div class="order-list-meta"><span id="orderResultCount">0건</span><span>한 페이지 최대 50건</span></div>
  <section id="adminOrders" class="admin-order-list"></section>
  <nav id="orderPagination" class="order-pagination" aria-label="주문 목록 페이지"></nav>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin-config.js?v=5332"></script>
<script src="js/admin-data.js?v=5332"></script>
<script src="js/admin-ui.js?v=5332"></script>
<script src="js/admin.js?v=5332"></script>
<script src="js/session-status.js?v=5332"></script>

<script src="js/pwa.js?v=5332"></script>
<script src="js/admin-page-transition.js?v=5332"></script>
<script src="js/version-badge.js?v=5332"></script>
<script src="js/back-navigation.js?v=5332"></script>
<script src="js/ui-preferences.js?v=5332"></script>
<script src="js/admin-mobile-nav.js?v=5332"></script>
</body>
</html>
