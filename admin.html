<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문관리</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header>
  <h1>🧦 주문관리</h1>
  <p>주문관리 페이지 (관리자)</p>
</header>

<main class="container">
  <div id="loginBox" class="product-card auth-card">
  <h2>관리자 로그인</h2>

  <label>관리자 이메일</label>
  <input
    id="adminEmail"
    class="order-input"
    type="email"
    placeholder="관리자 이메일"
  >

  <label>비밀번호</label>
  <input
    id="adminPassword"
    class="order-input"
    type="password"
    placeholder="비밀번호"
  >

  <button class="cart-btn" onclick="adminLogin()">
    관리자 로그인
  </button>

  <div id="adminLoginMessage"></div>
</div>

<div id="adminContent" style="display:none;">
  <div class="admin-menu">
  <button class="cart-btn" onclick="showAdminSection('orders')">
    주문관리
  </button>

  <button class="cart-btn gray-btn" onclick="showAdminSection('members')">
    회원관리
  </button>
</div>
  <div class="dashboard">
    <div><strong id="totalCount">0</strong><span>전체</span></div>
    <div><strong id="pendingCount">0</strong><span>주문접수</span></div>
    <div><strong id="doneCount">0</strong><span>출고완료</span></div>
  </div>

  <input id="adminSearch" class="search" placeholder="거래처명 / 품번 / 주문번호 검색">

  <div class="admin-filter">
    <button onclick="setAdminFilter('전체')">전체</button>
    <button onclick="setAdminFilter('주문접수')">주문접수</button>
    <button onclick="setAdminFilter('출고완료')">출고완료</button>
  </div>

  <button class="cart-btn" onclick="loadOrders()">주문 새로고침</button>

  <section id="adminOrders"></section>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin-config.js"></script>
<script src="js/admin-data.js"></script>
<script src="js/admin-ui.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
