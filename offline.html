<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>오프라인 - 디자인 삭스</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f3f6fa;font-family:Arial,sans-serif;color:#102b52}.card{width:min(420px,calc(100% - 40px));padding:34px;border-radius:24px;background:#fff;box-shadow:0 18px 50px rgba(0,0,0,.12);text-align:center}.icon{font-size:64px}button{padding:13px 22px;border:0;border-radius:12px;background:#24589f;color:#fff;font-size:16px;font-weight:800}</style></head><body><main class="card"><div class="icon">🧦</div><h1>인터넷 연결이 없습니다</h1><p>연결 상태를 확인한 뒤 다시 시도해주세요.</p><button onclick="location.reload()">다시 시도</button></main></body></html>
