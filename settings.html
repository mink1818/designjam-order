<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>디자인 삭스 환경설정</title><link rel="stylesheet" href="css/admin.css">
  <meta name="theme-color" content="#112437">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="삭스 관리자">
  <link rel="manifest" href="manifest-admin.webmanifest">
  <link rel="icon" href="icons/admin-192.png">
  <link rel="apple-touch-icon" href="icons/admin-180.png">
</head><body class="auth-pending" data-session-page="admin" data-pwa-app="admin"><header><h1>⚙️ 환경설정</h1><p>입금계좌와 운영 정보를 관리합니다.</p></header><main class="container"><button class="cart-btn gray-btn" onclick="location.href='admin-home.html'">← 관리자 대시보드</button>
<section class="product-card"><h2>입금계좌 등록</h2><div class="v3-account-form"><label>계좌 별칭<input id="accountLabel" placeholder="예: 국민은행 주계좌"></label><label>은행명<input id="accountBank" placeholder="국민은행"></label><label>계좌번호<input id="accountNumber" placeholder="123-456-789"></label><label>예금주<input id="accountHolder" placeholder="디자인 삭스"></label></div><div class="v3-card-actions"><button class="cart-btn" id="addAccountBtn">계좌 추가</button><button class="cart-btn gray-btn" id="cancelAccountEditBtn" hidden>수정 취소</button></div></section>
<section><div class="v3-section-heading"><h2>등록된 계좌</h2><span>기본 계좌는 새 주문에 자동 표시됩니다.</span></div><div id="accountList"></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/settings.js"></script><script src="js/session-status.js"></script><script src="js/pwa.js"></script>
</body></html>
