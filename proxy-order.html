<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>관리자 대신 주문 V6.1.3</title><link rel="stylesheet" href="css/admin.css?v=6130"><style>.proxy-shell{max-width:1200px;margin:auto;padding:20px}.proxy-card{background:#fff;border:1px solid #dbe3ec;border-radius:18px;padding:20px;margin-bottom:16px}.proxy-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.proxy-card label{font-weight:800}.proxy-card input,.proxy-card select,.proxy-card textarea{display:block;width:100%;box-sizing:border-box;margin-top:6px;padding:12px;border:1px solid #bcc9d6;border-radius:10px}.proxy-line{display:grid;grid-template-columns:1.2fr .55fr .7fr auto;gap:8px;margin:8px 0}.proxy-line button,.proxy-actions button{border:0;border-radius:10px;padding:12px 16px;font-weight:900;cursor:pointer}.remove-line{background:#fee2e2;color:#991b1b}.proxy-actions{display:flex;gap:10px;flex-wrap:wrap}.add-line{background:#e8eef5}.submit-proxy{background:#112437;color:#fff}.proxy-total{font-size:20px;font-weight:900;text-align:right;margin-top:12px}@media(max-width:700px){.proxy-shell{padding:10px}.proxy-card{padding:12px}.proxy-grid,.proxy-line{grid-template-columns:1fr}.proxy-actions button{width:100%}}</style></head><body class="auth-pending" data-session-page="admin"><header><h1>🛒 관리자 대신 주문</h1><p>거래처 정보를 선택하고 관리자가 주문을 직접 접수합니다.</p></header><main class="proxy-shell"><section class="proxy-card"><div class="proxy-grid"><label>거래처<select id="proxyCustomer"><option value="">거래처 선택</option></select></label><label>주문 메모<input id="proxyMemo" placeholder="예: 전화 주문, 빠른 출고"></label></div></section><section class="proxy-card"><h2>주문 품목</h2><div id="proxyLines"></div><div class="proxy-actions"><button id="addProxyLine" class="add-line" type="button">+ 품목 추가</button></div><div id="proxyTotal" class="proxy-total">총 0죽 · 0원</div></section><section class="proxy-card proxy-actions"><button id="submitProxyOrder" class="submit-proxy" type="button">대신 주문 접수</button><button type="button" onclick="location.href='members.html'">거래처 관리로 돌아가기</button></section></main><datalist id="proxyItemList"></datalist><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/admin-config.js?v=6130"></script><script src="js/proxy-order.js?v=6130"></script><script src="js/session-status.js?v=6130"></script><script src="js/version-badge.js?v=6130"></script></body></html>
