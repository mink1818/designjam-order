<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>관리자 대신 주문</title>
<link rel="stylesheet" href="css/admin.css?v=6210">
<style>
[hidden]{display:none!important}.proxy-shell{max-width:1200px;margin:auto;padding:20px}.proxy-card{background:#fff;border:1px solid #dbe3ec;border-radius:18px;padding:20px;margin-bottom:16px}.proxy-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.proxy-card label{font-weight:800}.proxy-card input,.proxy-card select,.proxy-card textarea{display:block;width:100%;box-sizing:border-box;margin-top:6px;padding:12px;border:1px solid #bcc9d6;border-radius:10px}.proxy-line,.proxy-line-head{display:grid;grid-template-columns:1.2fr .55fr .7fr .8fr auto;gap:8px;margin:8px 0;align-items:center}.proxy-line-head{font-weight:900;color:#33485c;padding:0 4px}.proxy-line-head span:nth-child(n+2){text-align:center}.proxy-line button,.proxy-actions button{border:0;border-radius:10px;padding:12px 16px;font-weight:900;cursor:pointer}.remove-line{background:#fee2e2;color:#991b1b}.proxy-actions{display:flex;gap:10px;flex-wrap:wrap}.add-line{background:#e8eef5}.submit-proxy{background:#112437;color:#fff}.proxy-total{font-size:20px;font-weight:900;text-align:right;margin-top:12px}.proxy-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.proxy-summary div{background:#eef5fb;border-radius:14px;padding:14px;text-align:center;min-width:0}.proxy-summary span,.proxy-summary strong{display:block}.proxy-summary strong{font-size:20px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.proxy-line-total{display:flex;align-items:center;justify-content:flex-end;white-space:nowrap}.proxy-customer-mode{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px}.proxy-customer-mode label{display:flex;align-items:center;gap:7px}.proxy-customer-mode input{width:auto;margin:0}.proxy-help{margin:8px 0 0;color:#526577;font-size:13px}.proxy-error{display:none;margin:0 0 14px;padding:12px;border-radius:10px;background:#fee2e2;color:#991b1b;font-weight:800}.proxy-error.show{display:block}@media(max-width:700px){.proxy-line-head{grid-template-columns:1fr 1fr 1fr 1fr}.proxy-line-head span:last-child{display:none}.proxy-summary{grid-template-columns:repeat(2,1fr);gap:6px}.proxy-summary div{padding:10px 4px}.proxy-summary strong{font-size:16px}.proxy-shell{padding:10px}.proxy-card{padding:12px}.proxy-grid,.proxy-line{grid-template-columns:1fr}.proxy-actions button{width:100%}.proxy-line-total{justify-content:flex-start;padding:4px 2px}}
</style>
</head>
<body class="auth-pending" data-session-page="admin">
<header><h1>🛒 관리자 대신 주문</h1><p>전화·문자 주문을 관리자가 직접 접수하고 피킹에서 최종검증합니다.</p></header>
<main class="proxy-shell">
<section class="proxy-summary">
<div><span>거래처</span><strong id="proxySummaryCustomer">미선택</strong></div>
<div><span>총 품번</span><strong id="proxySummarySku">0종</strong></div>
<div><span>총수량</span><strong id="proxySummaryQty">0죽</strong></div>
<div><span>총금액</span><strong id="proxySummaryTotal">0원</strong></div>
</section>
<p id="proxyError" class="proxy-error"></p>
<section class="proxy-card">
<div class="proxy-customer-mode">
<label><input type="radio" name="proxyCustomerMode" value="select" checked> 등록 거래처 선택</label>
<label><input type="radio" name="proxyCustomerMode" value="direct"> 거래처 직접 입력</label>
</div>
<div id="proxySelectWrap" class="proxy-grid"><label>거래처<select id="proxyCustomer"><option value="">거래처 선택</option></select></label></div>
<div id="proxyDirectWrap" class="proxy-grid" hidden>
<label>거래처명<input id="proxyDirectName" placeholder="상호명 또는 거래처명"></label>
<label>대표자명<input id="proxyDirectOwner" placeholder="대표자명(선택)"></label>
<label>전화번호<input id="proxyDirectPhone" placeholder="전화번호"></label>
<label>주소<input id="proxyDirectAddress" placeholder="배송 주소"></label>
</div>
<label>주문 메모<input id="proxyMemo" placeholder="예: 전화 주문, 빠른 출고"></label>
<p class="proxy-help">직접 입력한 거래처 정보는 이 주문에만 저장되며 거래처 목록에는 자동 등록되지 않습니다.</p>
</section>
<section class="proxy-card"><h2>주문 품목</h2><div class="proxy-line-head" aria-hidden="true"><span>품번</span><span>수량</span><span>가격</span><span>금액</span><span>관리</span></div><div id="proxyLines"></div><div class="proxy-actions"><button id="addProxyLine" class="add-line" type="button">+ 품목 추가</button></div><div id="proxyTotal" class="proxy-total">총 0품번 · 0죽 · 0원</div></section>
<section class="proxy-card proxy-actions"><button id="submitProxyOrder" class="submit-proxy" type="button">대신 주문 접수</button><button type="button" onclick="location.href='admin-home.html'">관리자 메인으로</button></section>
</main>
<datalist id="proxyItemList"></datalist>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/admin-config.js?v=6210"></script><script src="js/proxy-order.js?v=6210"></script><script src="js/session-status.js?v=6210"></script><script src="js/version-badge.js?v=6210"></script><script src="js/admin-mobile-nav.js?v=6210"></script>
</body></html>
