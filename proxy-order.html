<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>관리자 대신 주문 V6.1.4</title><link rel="stylesheet" href="css/admin.css?v=6140"><style>.proxy-shell{max-width:1200px;margin:auto;padding:20px}.proxy-card{background:#fff;border:1px solid #dbe3ec;border-radius:18px;padding:20px;margin-bottom:16px}.proxy-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.proxy-card label{font-weight:800}.proxy-card input,.proxy-card select,.proxy-card textarea{display:block;width:100%;box-sizing:border-box;margin-top:6px;padding:12px;border:1px solid #bcc9d6;border-radius:10px}.proxy-line{display:grid;grid-template-columns:1.2fr .55fr .7fr .75fr auto;gap:8px;margin:8px 0}.proxy-line button,.proxy-actions button{border:0;border-radius:10px;padding:12px 16px;font-weight:900;cursor:pointer}.remove-line{background:#fee2e2;color:#991b1b}.proxy-actions{display:flex;gap:10px;flex-wrap:wrap}.add-line{background:#e8eef5}.submit-proxy{background:#112437;color:#fff}.proxy-total{font-size:20px;font-weight:900;text-align:right;margin-top:12px}.proxy-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.proxy-summary div{background:#eef5fb;border-radius:14px;padding:14px;text-align:center}.proxy-summary span,.proxy-summary strong{display:block}.proxy-summary strong{font-size:22px;margin-top:4px}.proxy-line-total{display:flex;align-items:center;justify-content:flex-end;white-space:nowrap}.proxy-customer-mode{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px}.proxy-customer-mode label{display:flex;align-items:center;gap:7px}.proxy-customer-mode input{width:auto;margin:0}@media(max-width:700px){.proxy-summary{grid-template-columns:repeat(3,1fr);gap:6px}.proxy-summary div{padding:10px 4px}.proxy-summary strong{font-size:17px}.proxy-shell{padding:10px}.proxy-card{padding:12px}.proxy-grid,.proxy-line{grid-template-columns:1fr}.proxy-actions button{width:100%}}</style></head><body class="auth-pending" data-session-page="admin"><header><h1>🛒 관리자 대신 주문</h1><p>거래처 정보를 선택하고 관리자가 주문을 직접 접수합니다.</p></header><main class="proxy-shell"><section class="proxy-summary"><div><span>품번</span><strong id="proxySummarySku">0</strong></div><div><span>총수량</span><strong id="proxySummaryQty">0죽</strong></div><div><span>총금액</span><strong id="proxySummaryTotal">0원</strong></div></section><section class="proxy-card"><div class="proxy-customer-mode"><label><input type="radio" name="proxyCustomerMode" value="select" checked> 등록 거래처 선택</label><label><input type="radio" name="proxyCustomerMode" value="direct"> 거래처 직접 입력</label></div><div id="proxySelectWrap" class="proxy-grid"><label>거래처<select id="proxyCustomer"><option value="">거래처 선택</option></select></label><label>주문 메모<input id="proxyMemo" placeholder="예: 전화 주문, 빠른 출고"></label></div><div id="proxyDirectWrap" class="proxy-grid" hidden><label>거래처명<input id="proxyDirectName" placeholder="상호명 또는 거래처명"></label><label>대표자명<input id="proxyDirectOwner" placeholder="대표자명(선택)"></label><label>전화번호<input id="proxyDirectPhone" placeholder="전화번호"></label><label>주소<input id="proxyDirectAddress" placeholder="배송 주소"></label></div></section><section class="proxy-card"><h2>주문 품목</h2><div id="proxyLines"></div><div class="proxy-actions"><button id="addProxyLine" class="add-line" type="button">+ 품목 추가</button></div><div id="proxyTotal" class="proxy-total">총 0죽 · 0원</div></section><section class="proxy-card proxy-actions"><button id="submitProxyOrder" class="submit-proxy" type="button">대신 주문 접수</button><button type="button" onclick="location.href='members.html'">거래처 관리로 돌아가기</button></section></main><datalist id="proxyItemList"></datalist><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/admin-config.js?v=6140"></script><script src="js/proxy-order.js?v=6140"></script><script src="js/session-status.js?v=6140"></script><script src="js/version-badge.js?v=6140"></script></body></html>
