<section class="product-card"><h2>새 게시물</h2><div class="v3-notice-form"><label>유형<select id="noticeType"><option>일반공지</option><option>특가이벤트</option><option>신상품</option><option>재입고</option><option>배송안내</option><option>긴급공지</option></select></label><label>제목<input id="noticeTitle" placeholder="제목을 입력하세요"></label><label class="wide">내용<textarea id="noticeContent" rows="5" placeholder="거래처에 보여줄 내용을 입력하세요"></textarea></label><label>이미지 파일<input id="noticeImageFile" type="file" accept="image/*"></label><label>또는 이미지 URL<input id="noticeImage" placeholder="선택사항"></label><div id="noticePreview" class="notice-upload-preview wide"></div><label>게시 시작일<input id="noticeStart" type="date"></label><label>게시 종료일<input id="noticeEnd" type="date"></label><label class="wide">연결 주소<input id="noticeLink" type="url" placeholder="선택사항: 상품·이벤트 페이지 주소"></label><label class="check-label"><input id="noticePinned" type="checkbox"> 상단 고정</label></div><button class="cart-btn" id="saveNoticeBtn">게시하기</button></section>
