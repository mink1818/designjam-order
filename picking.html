<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DESIGN SOCKS 작업지시서·피킹검증</title>
  <link rel="stylesheet" href="css/admin.css?v=6250">
  <link rel="stylesheet" href="css/picking.css?v=6250">
  <link rel="stylesheet" href="css/v625.css?v=6250">
</head>
<body class="auth-pending" data-session-page="admin">
  <header><h1>📋 작업지시서·피킹 최종검증</h1><p>거래처 주문목록대로 피킹하고, 바코드 검증이 일치하면 피킹 최종검증이 완료되고 주문관리의 출고대기로 이동합니다.</p></header>
  <main class="picking-shell">
    <section class="pick-toolbar"><input id="orderSearch" type="search" placeholder="거래처명·주문번호·품번 검색"><select id="pickingSort" aria-label="출고 품번 정렬"><option value="item-asc">품번 낮은순</option><option value="item-desc">품번 높은순</option><option value="ordered-desc">주문수량 많은순</option><option value="status">피킹미완료 우선</option></select><button id="refreshOrders">새로고침</button><a href="scanner.html">ERP 재고센터</a></section>
    <section class="pick-layout">
      <aside><div class="picking-waiting-heading"><h2>피킹 대기 주문</h2><div id="pickingWaitingSummary" class="picking-waiting-summary"><b>0건</b><span>총 0죽 · 남은 0죽</span></div></div><div id="orderList"></div></aside>
      <article id="workArea" class="work-area"><div class="empty-work">왼쪽에서 주문을 선택하세요.</div></article>
    </section>
  </main>
  <input id="pickScanInput" class="pick-hidden-input" autocomplete="off" inputmode="none">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/ui-preferences.js?v=6250"></script>
  <script src="js/admin-config.js?v=6250"></script>
  <script src="js/picking.js?v=6250"></script>
  <script src="js/session-status.js?v=6250"></script>
  <script src="js/version-badge.js?v=6250"></script>
  <script src="js/admin-mobile-nav.js?v=6250"></script>
</body>
</html>
