<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DESIGN SOCKS V6 ERP 재고센터</title><link rel="stylesheet" href="css/admin.css?v=6000"><link rel="stylesheet" href="css/scanner.css?v=6000">
</head><body class="auth-pending" data-session-page="admin"><header><h1>📦 V6 ERP 재고센터</h1><p>입고·출고 스캔, 실시간 재고, 작업이력을 여러 PC에서 함께 사용합니다.</p></header>
<main class="scanner-shell">
<section class="scanner-control-card">
 <div class="scanner-mode-row"><button id="modeIn" class="scanner-mode active" data-mode="IN">입고</button><button id="modeOut" class="scanner-mode" data-mode="OUT">출고</button></div>
 <div class="scanner-step-row"><span>스캔 1회 적용수량</span><button class="step-btn active" data-step="1">+1</button><button class="step-btn" data-step="5">+5</button><button class="step-btn" data-step="10">+10</button><button class="step-btn" data-step="20">+20</button></div>
 <input id="scanInput" class="scanner-hidden-input" autocomplete="off" inputmode="none" aria-label="바코드 입력">
 <div id="scanStatus" class="scan-status ready"><strong>스캔 대기</strong><span>이 화면이 활성화되어 있으면 입력칸을 클릭하지 않아도 바로 스캔됩니다.</span></div>
 <div class="scanner-meta"><label>PC 이름 <input id="deviceName" type="text" maxlength="30" placeholder="예: 창고PC-1"></label><button id="syncProducts" type="button">상품 품번 동기화</button><button id="exportInventory" type="button">재고 CSV</button><button id="exportMovements" type="button">이력 CSV</button></div>
</section>
<section class="scanner-summary-grid"><article><span>총 품번</span><strong id="totalSku">0</strong></article><article><span>총 재고</span><strong id="totalQty">0</strong></article><article><span>안전재고 이하</span><strong id="lowQty">0</strong></article><article><span>품절</span><strong id="outQty">0</strong></article></section>
<section class="scanner-grid"><div class="scanner-panel"><h2>최근 스캔</h2><div id="recentScans" class="scan-list"></div></div><div class="scanner-panel"><h2>실시간 재고 검색</h2><input id="inventorySearch" type="search" placeholder="품번·상품명·위치 검색"><div id="inventoryList" class="inventory-live-list"></div></div></section>
<section class="scanner-panel movement-panel"><div class="movement-title-row"><h2>입출고 작업이력</h2><button id="refreshMovements" type="button">새로고침</button></div><div class="movement-filters"><input id="movementSearch" type="search" placeholder="품번·PC·주문번호 검색"><select id="movementType"><option value="">전체</option><option value="IN">입고</option><option value="OUT">출고</option><option value="ADJUST">조정</option></select></div><div id="movementList" class="movement-list"></div></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/admin-config.js?v=6000"></script><script src="js/scanner.js?v=6000"></script><script src="js/session-status.js?v=6000"></script><script src="js/version-badge.js?v=6000"></script>
</body></html>
