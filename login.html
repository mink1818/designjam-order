<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  
  <meta name="description" content="디자인삭스 거래처용 상품 주문 및 주문조회 시스템">
  <meta property="og:title" content="디자인삭스 주문관리 (거래처)">
  <meta property="og:description" content="디자인삭스 거래처용 상품 주문 및 주문조회 시스템">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://designjam-order.vercel.app/login.html">
  <meta property="og:image" content="https://designjam-order.vercel.app/icons/customer-512.png?v=5332">
<title>디자인삭스 주문관리 (거래처)</title>

  <link rel="stylesheet" href="css/main.css?v=5332">

  <meta name="theme-color" content="#24589f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="디자인삭스 거래처">
  <link rel="manifest" href="manifest-customer.webmanifest?v=5332">
  <link rel="icon" href="icons/customer-192.png?v=5332">
  <link rel="apple-touch-icon" href="icons/customer-180.png?v=5332">
</head>

<body data-pwa-app="customer">

<header>
  <h1>🧦 디자인 삭스</h1>
  <p>주문관리</p>
</header>

<main class="container">

  <section class="product-card auth-card">

    <h2>거래처 로그인</h2>

    <label for="loginPhone" id="loginIdentityLabel">
      휴대폰번호
    </label>

    <input
      id="loginPhone"
      class="order-input"
      type="tel"
      inputmode="numeric"
      autocomplete="tel"
      maxlength="13"
      placeholder="예: 010-1234-5678"
    >

    <label for="loginPassword">
      비밀번호
    </label>

    <input
      id="loginPassword"
      class="order-input"
      type="password"
      autocomplete="current-password"
      placeholder="비밀번호"
    >


    <button
      id="loginButton"
      class="cart-btn"
      type="button"
    >
      로그인
    </button>

    <button
      class="cart-btn gray-btn"
      type="button"
      onclick="location.href='signup.html'"
    >
      회원가입
    </button>

    <button class="cart-btn install-app-button" type="button" data-install-app>홈 화면에 추가</button>

    <div id="loginMessage"></div>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/login.js?v=5332"></script>

<script src="js/pwa.js?v=5332"></script>
<script src="js/version-badge.js?v=5332"></script>
<script src="js/ui-preferences.js?v=5332"></script>
</body>
</html>
