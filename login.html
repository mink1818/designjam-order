<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>디자인 삭스 로그인</title>

  <link rel="stylesheet" href="css/main.css">
</head>

<body>

<header>
  <h1>🧦 디자인 삭스</h1>
  <p>거래처 로그인</p>
</header>

<main class="container">

  <section class="product-card auth-card">

    <h2>로그인</h2>

    <label for="loginPhone">
      휴대폰번호
    </label>

    <input
      id="loginPhone"
      class="order-input"
      type="tel"
      inputmode="numeric"
      autocomplete="tel"
      maxlength="13"
      placeholder="예: 010-1234-5678"
    >

    <label for="loginPassword">
      비밀번호
    </label>

    <input
      id="loginPassword"
      class="order-input"
      type="password"
      autocomplete="current-password"
      placeholder="비밀번호"
    >

    <button
      id="loginButton"
      class="cart-btn"
      type="button"
    >
      로그인
    </button>

    <button
      class="cart-btn gray-btn"
      type="button"
      onclick="location.href='signup.html'"
    >
      회원가입
    </button>

    <div id="loginMessage"></div>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/login.js"></script>

</body>
</html>
